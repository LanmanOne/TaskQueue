<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Queue v1.3 - Secure</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #121212; --sidebar-bg: #1e1e1e;
            --card-green: #2ecc71; --card-yellow: #f1c40f;
            --card-red: #e74c3c; --card-critical: #96281b;
            --card-font-size: 1rem;
            --sidebar-width: 320px;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-dark); color: #eee; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Lock Screen Styles */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #121212; z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .id-badge {
            background: #2a2a2a; padding: 20px; border-radius: 10px;
            border: 1px dashed #555; font-family: monospace; color: #3498db;
            font-size: 1.2rem; margin: 20px 0; user-select: all;
        }

        /* Existing Styles ... */
        #sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); padding: 25px; display: flex; flex-direction: column; gap: 12px; z-index: 20; box-shadow: 4px 0 15px rgba(0,0,0,0.5); overflow-y: auto; transition: margin-left 0.3s ease; position: relative; }
        #sidebar.collapsed { margin-left: calc(var(--sidebar-width) * -1); }
        #toggle-pc { position: fixed; left: var(--sidebar-width); top: 50%; transform: translateY(-50%); background: var(--sidebar-bg); border: 1px solid #333; border-left: none; color: white; padding: 15px 8px; cursor: pointer; border-radius: 0 8px 8px 0; z-index: 21; transition: left 0.3s ease; }
        .collapsed + #toggle-pc { left: 0; }
        .top-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        #searchBar { flex-grow: 1; background: #2a2a2a; border: 1px solid #444; padding: 10px; border-radius: 6px; color: white; }
        #main-display { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .queue-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.4); display: flex; flex-direction: column; justify-content: center; min-height: 180px; font-size: var(--card-font-size); }
        .status-green { background: var(--card-green); color: white; }
        .status-yellow { background: var(--card-yellow); color: #111; }
        .status-red { background: var(--card-red); color: white; }
        .status-critical { background: var(--card-critical); color: white; animation: flash 1s infinite; }
        @keyframes flash { 0%, 100% { background: var(--card-critical); } 50% { background: #ff0000; } }
        label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; font-weight: bold; margin-bottom: -5px; }
        input, textarea, button { padding: 12px; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: white; font-size: 1rem; }
        button.primary { background: #3498db; border: none; font-weight: bold; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #fff; color: #222; padding: 30px; border-radius: 15px; width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 15px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="lock-screen" style="display: none;">
        <h1>Device Unauthorized</h1>
        <p>Please provide this Device ID to the administrator for access:</p>
        <div id="display-id" class="id-badge">GENERATING...</div>
        <button onclick="location.reload()" style="background: #333; border: 1px solid #444;">Check Approval Status</button>
    </div>

    <div id="sidebar">
        <h2 style="margin:0 0 10px 0">New Task</h2>
        <label>Task Name</label><input type="text" id="custName">
        <label>Subject</label><input type="text" id="jobSubject">
        <label>Due Date & Time</label>
        <div style="display:flex; gap:5px"><input type="date" id="dueDate" style="flex:2"><input type="time" id="dueTime" style="flex:1"></div>
        <label>Notes</label><textarea id="jobNotes" rows="4"></textarea>
        <button class="primary" onclick="addJob()">Add to Queue</button>
        <button onclick="toggleSidebar()" style="background:none; border:none; color:#555; cursor:pointer; text-decoration:underline; margin-top:10px">Collapse Sidebar</button>
    </div>

    <button id="toggle-pc" onclick="toggleSidebar()">◀</button>

    <div id="main-display">
        <div class="top-bar">
            <input type="text" id="searchBar" placeholder="Search tasks..." oninput="renderQueue()">
            <button onclick="openSettings()" style="background:none; border:none; cursor:pointer; font-size:1.5rem;">⚙️</button>
        </div>
        <div id="queue-container" class="queue-grid"></div>
    </div>

    <div id="settings-modal" class="modal" onclick="closeSettings()"><div class="modal-content" onclick="event.stopPropagation()">... (Settings Content) ...</div></div>
    <div id="details-modal" class="modal" onclick="closeModal()"><div class="modal-content" onclick="event.stopPropagation()">... (Details Content) ...</div></div>

    <script>
        const SUPABASE_URL = 'https://hnznwbklfoiolptvvypf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhuem53YmtsZm9pb2xwdHZ2eXBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg3ODQzNzUsImV4cCI6MjA4NDM2MDM3NX0.dsgpuQB71AkcHKKBTzcYiwxcVLZWdEVd9vcpkVEtWME';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let queue = [];
        let settings = { fontSize: 1, colors: {}, thresholds: { medium: 60, urgent: 30, critical: 15 } };
        let deviceId = null;

        // 1. DEVICE ID MANAGEMENT
        function getDeviceId() {
            let id = localStorage.getItem('task_queue_device_id');
            if (!id) {
                id = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase() + '-' + Date.now().toString(36).toUpperCase();
                localStorage.setItem('task_queue_device_id', id);
            }
            return id;
        }

        async function checkApproval() {
            deviceId = getDeviceId();
            document.getElementById('display-id').innerText = deviceId;

            const { data, error } = await sb
                .from('approved_devices')
                .select('device_id')
                .eq('device_id', deviceId)
                .single();

            if (error || !data) {
                document.getElementById('lock-screen').style.display = 'flex';
                return false;
            }
            return true;
        }

        async function init() {
            const isApproved = await checkApproval();
            if (!isApproved) return; // Stop here if not approved

            await fetchSettings();
            await fetchTasks();
            
            // Subscriptions
            sb.channel('sync').on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, fetchTasks).on('postgres_changes', { event: '*', schema: 'public', table: 'settings' }, fetchSettings).subscribe();
            
            setInterval(renderQueue, 1000);
            document.getElementById('dueDate').valueAsDate = new Date();
        }

        // ... Rest of your existing functions (fetchTasks, renderQueue, addJob, toggleSidebar, etc.) ...
        
        function toggleSidebar() {
            const sbElem = document.getElementById('sidebar');
            const btn = document.getElementById('toggle-pc');
            const isCol = sbElem.classList.toggle('collapsed');
            btn.innerText = isCol ? '▶' : '◀';
        }

        async function fetchSettings() {
            const { data } = await sb.from('settings').select('data').eq('id', 1).single();
            if (data) { settings = data.data; applySettings(); }
        }

        async function fetchTasks() {
            const { data } = await sb.from('tasks').select('*');
            queue = data || [];
            renderQueue();
        }

        function renderQueue() {
            const container = document.getElementById('queue-container');
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = queue.filter(j => j.name.toLowerCase().includes(query) || j.subject.toLowerCase().includes(query));
            const sorted = filtered.sort((a, b) => a.due_timestamp - b.due_timestamp);
            
            container.innerHTML = ''; 
            sorted.forEach((job) => {
                const diff = job.due_timestamp - Date.now();
                const mins = diff / 60000;
                let s = "status-green";
                if(mins < settings.thresholds.critical) s = "status-critical";
                else if(mins < settings.thresholds.urgent) s = "status-red";
                else if(mins < settings.thresholds.medium) s = "status-yellow";
                const card = document.createElement('div');
                card.className = `card ${s}`;
                card.onclick = () => openModal(job.id);
                card.innerHTML = `<h3>${job.name}</h3><p>${job.subject}</p><div class="timer">${formatCountdown(diff)}</div>`;
                container.appendChild(card);
            });
        }

        function formatCountdown(ms) {
            const abs = Math.abs(ms);
            const d = Math.floor(abs / 86400000), h = Math.floor((abs % 86400000) / 3600000), m = Math.floor((abs % 3600000) / 60000), s = Math.floor((abs % 60000) / 1000);
            let p = []; if(d > 0) p.push(`${d}D`); if(h > 0 || d > 0) p.push(`${h}H`); p.push(`${m}M`, `${s}S`);
            return (ms < 0 ? '- ' : '') + p.join(' ');
        }

        function applySettings() {
            const root = document.documentElement;
            root.style.setProperty('--card-font-size', settings.fontSize + 'rem');
            root.style.setProperty('--card-green', settings.colors.green);
            root.style.setProperty('--card-yellow', settings.colors.yellow);
            root.style.setProperty('--card-red', settings.colors.red);
            root.style.setProperty('--card-critical', settings.colors.critical);
        }

        // Initial setup
        init();
    </script>
</body>
</html>
