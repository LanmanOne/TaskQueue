<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Queue v1.4 - Secure & Fluid</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #121212; --sidebar-bg: #1e1e1e;
            --card-green: #2ecc71; --card-yellow: #f1c40f;
            --card-red: #e74c3c; --card-critical: #96281b;
            --card-font-size: 1rem;
            --sidebar-width: 320px;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-dark); color: #eee; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Lock Screen */
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .id-badge { background: #2a2a2a; padding: 20px; border-radius: 10px; border: 1px dashed #555; font-family: monospace; color: #3498db; font-size: 1.2rem; margin: 20px 0; user-select: all; }

        /* Sidebar (PC & Mobile Logic) */
        #sidebar { 
            width: var(--sidebar-width); background: var(--sidebar-bg); padding: 25px; 
            display: flex; flex-direction: column; gap: 12px; z-index: 40; 
            box-shadow: 4px 0 15px rgba(0,0,0,0.5); overflow-y: auto; 
            transition: margin-left 0.3s ease, transform 0.3s ease; position: relative; 
        }
        #sidebar.collapsed { margin-left: calc(var(--sidebar-width) * -1); }

        #toggle-pc { position: fixed; left: var(--sidebar-width); top: 50%; transform: translateY(-50%); background: var(--sidebar-bg); border: 1px solid #333; border-left: none; color: white; padding: 15px 8px; cursor: pointer; border-radius: 0 8px 8px 0; z-index: 41; transition: left 0.3s ease; }
        .collapsed + #toggle-pc { left: 0; }

        /* Unified Top Bar */
        .top-bar { 
            display: flex; align-items: center; gap: 12px; background: #1e1e1e; padding: 10px 15px; 
            border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 30; height: 60px; box-sizing: border-box;
        }
        .search-wrapper { position: relative; flex-grow: 1; display: flex; align-items: center; }
        #searchBar { width: 100%; background: #2a2a2a; border: 1px solid #444; padding: 8px 35px 8px 15px; border-radius: 20px; color: white; font-size: 0.95rem; outline: none; }
        #clearSearch { position: absolute; right: 10px; background: none; border: none; color: #666; cursor: pointer; font-size: 1.2rem; display: none; }

        .icon-btn { background: #3498db; border: none; color: white; width: 38px; height: 38px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 1.2rem; flex-shrink: 0; transition: transform 0.2s; }
        .icon-btn:active { transform: scale(0.9); }

        #main-display { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .content-area { padding: 20px; }

        @media (max-width: 768px) {
            #sidebar { 
                position: fixed; top: 60px; left: 0; width: 100%; height: auto; max-height: 85vh; 
                margin-left: 0; transform: translateY(-120%); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            }
            #sidebar.expanded { transform: translateY(0); }
            #toggle-pc { display: none; }
        }

        /* Cards & Grid */
        .queue-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.4); display: flex; flex-direction: column; justify-content: center; min-height: 160px; font-size: var(--card-font-size); }
        .card h3 { margin: 0; font-size: 1.8em; word-break: break-word; }
        .timer { font-size: 1.8em; font-weight: 800; font-family: monospace; margin-top: 10px; }

        .status-green { background: var(--card-green); color: white; }
        .status-yellow { background: var(--card-yellow); color: #111; }
        .status-red { background: var(--card-red); color: white; }
        .status-critical { background: var(--card-critical); color: white; animation: flash 1s infinite; }
        @keyframes flash { 0%, 100% { background: var(--card-critical); } 50% { background: #ff0000; } }

        label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; font-weight: bold; margin-bottom: -5px; margin-top: 5px; }
        input, textarea, button { padding: 12px; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: white; font-size: 1rem; }
        button.primary { background: #3498db; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #fff; color: #222; padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 12px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="lock-screen" style="display: none;">
        <h1>Device Unauthorized</h1>
        <p>Provide this Device ID for access:</p>
        <div id="display-id" class="id-badge">...</div>
        <button onclick="location.reload()" style="background: #333; cursor:pointer">Check Status</button>
    </div>

    <div id="sidebar">
        <h2 style="margin:0">New Task</h2>
        <label>Task Name</label><input type="text" id="custName">
        <label>Subject</label><input type="text" id="jobSubject">
        <label>Due Date & Time</label>
        <div style="display:flex; gap:5px"><input type="date" id="dueDate" style="flex:2"><input type="time" id="dueTime" style="flex:1"></div>
        <label>Notes</label><textarea id="jobNotes" rows="4"></textarea>
        <button class="primary" onclick="addJob()">Add to Queue</button>
    </div>

    <button id="toggle-pc" onclick="toggleSidebar()">◀</button>

    <div id="main-display">
        <div class="top-bar">
            <div class="search-wrapper">
                <input type="text" id="searchBar" placeholder="Search tasks..." oninput="handleSearchInput()">
                <button id="clearSearch" onclick="clearSearch()">✕</button>
            </div>
            <button class="icon-btn" id="mobileAddBtn" onclick="toggleSidebar()">＋</button>
            <button onclick="openSettings()" style="background:none; border:none; cursor:pointer; font-size:1.5rem; padding:0">⚙️</button>
        </div>

        <div class="content-area">
            <div id="queue-container" class="queue-grid"></div>
        </div>
    </div>

    <div id="settings-modal" class="modal" onclick="closeSettings()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="margin:0">Settings</h2>
            <label style="color:#666">Font Size</label>
            <input type="range" id="set-font" min="0.5" max="1.5" step="0.1" oninput="settings.fontSize = this.value; applySettings();">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                <div><label style="color:#666">Normal</label><input type="color" id="col-green" style="width:100%"></div>
                <div><label style="color:#666">Medium</label><input type="color" id="col-yellow" style="width:100%"></div>
                <div><label style="color:#666">Urgent</label><input type="color" id="col-red" style="width:100%"></div>
                <div><label style="color:#666">Critical</label><input type="color" id="col-critical" style="width:100%"></div>
            </div>
            <button class="primary" onclick="saveSettings()">Save Configuration</button>
        </div>
    </div>

    <div id="details-modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="view-mode">
                <h1 id="view-name" style="margin:0"></h1>
                <h3 id="view-subject" style="color:#666; margin:5px 0"></h3>
                <p id="view-notes" style="background:#f4f4f4; padding:15px; border-radius:8px; white-space: pre-wrap;"></p>
                <div style="display:flex; gap:10px">
                    <button style="background:#f39c12; flex:1" onclick="toggleEdit(true)">Edit</button>
                    <button style="background:#e74c3c; flex:1" onclick="deleteJob()">Complete</button>
                </div>
            </div>
            <div id="edit-mode" style="display:none; flex-direction:column; gap:8px;">
                <h2>Edit Task</h2>
                <input type="text" id="edit-name">
                <input type="text" id="edit-subject">
                <div style="display:flex; gap:5px"><input type="date" id="edit-date" style="flex:2"><input type="time" id="edit-time" style="flex:1"></div>
                <textarea id="edit-notes" rows="4"></textarea>
                <button class="primary" onclick="updateJob()">Update Task</button>
            </div>
            <button onclick="closeModal()" style="margin-top:10px; background:none; border:none; color:#999; text-decoration:underline">Close</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hnznwbklfoiolptvvypf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhuem53YmtsZm9pb2xwdHZ2eXBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg3ODQzNzUsImV4cCI6MjA4NDM2MDM3NX0.dsgpuQB71AkcHKKBTzcYiwxcVLZWdEVd9vcpkVEtWME';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let queue = [], activeJobId = null;
        let settings = { fontSize: 1, colors: {}, thresholds: { medium: 60, urgent: 30, critical: 15 } };

        function getDeviceId() {
            let id = localStorage.getItem('task_queue_device_id');
            if (!id) {
                id = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase() + '-' + Date.now().toString(36).toUpperCase();
                localStorage.setItem('task_queue_device_id', id);
            }
            return id;
        }

        async function init() {
            const deviceId = getDeviceId();
            document.getElementById('display-id').innerText = deviceId;
            const { data } = await sb.from('approved_devices').select('device_id').eq('device_id', deviceId).single();
            if (!data) return document.getElementById('lock-screen').style.display = 'flex';

            await fetchSettings(); await fetchTasks();
            sb.channel('sync').on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, fetchTasks).subscribe();
            setInterval(renderQueue, 1000);
            document.getElementById('dueDate').valueAsDate = new Date();
        }

        async function fetchSettings() {
            const { data } = await sb.from('settings').select('data').eq('id', 1).single();
            if (data) { settings = data.data; applySettings(); }
        }

        async function saveSettings() {
            settings.colors = { green: document.getElementById('col-green').value, yellow: document.getElementById('col-yellow').value, red: document.getElementById('col-red').value, critical: document.getElementById('col-critical').value };
            await sb.from('settings').update({ data: settings }).eq('id', 1);
            closeSettings();
        }

        function applySettings() {
            const root = document.documentElement;
            root.style.setProperty('--card-font-size', settings.fontSize + 'rem');
            root.style.setProperty('--card-green', settings.colors.green);
            root.style.setProperty('--card-yellow', settings.colors.yellow);
            root.style.setProperty('--card-red', settings.colors.red);
            root.style.setProperty('--card-critical', settings.colors.critical);
        }

        async function fetchTasks() {
            const { data } = await sb.from('tasks').select('*');
            queue = data || []; renderQueue();
        }

        function handleSearchInput() {
            const val = document.getElementById('searchBar').value;
            document.getElementById('clearSearch').style.display = val ? 'block' : 'none';
            renderQueue();
        }

        function clearSearch() {
            document.getElementById('searchBar').value = '';
            handleSearchInput();
        }

        function renderQueue() {
            const container = document.getElementById('queue-container');
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = queue.filter(j => (j.name||"").toLowerCase().includes(query) || (j.subject||"").toLowerCase().includes(query));
            const sorted = filtered.sort((a, b) => a.due_timestamp - b.due_timestamp);
            
            container.innerHTML = '';
            sorted.forEach(job => {
                const diff = job.due_timestamp - Date.now();
                const mins = diff / 60000;
                let s = "status-green";
                if(mins < settings.thresholds.critical) s = "status-critical";
                else if(mins < settings.thresholds.urgent) s = "status-red";
                else if(mins < settings.thresholds.medium) s = "status-yellow";
                
                const card = document.createElement('div');
                card.className = `card ${s}`;
                card.onclick = () => openModal(job.id);
                card.innerHTML = `<h3>${job.name}</h3><p>${job.subject}</p><div class="timer">${formatCountdown(diff)}</div>`;
                container.appendChild(card);
            });
        }

        function formatCountdown(ms) {
            const abs = Math.abs(ms);
            const d = Math.floor(abs/86400000), h = Math.floor((abs%86400000)/3600000), m = Math.floor((abs%3600000)/60000), s = Math.floor((abs%60000)/1000);
            return (ms < 0 ? '- ' : '') + (d > 0 ? d+'D ' : '') + (h > 0 ? h+'H ' : '') + m+'M '+s+'S';
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const btnPC = document.getElementById('toggle-pc');
            const btnMob = document.getElementById('mobileAddBtn');
            if (window.innerWidth <= 768) {
                const isExp = sb.classList.toggle('expanded');
                btnMob.innerText = isExp ? '✕' : '＋';
                btnMob.style.background = isExp ? '#e74c3c' : '#3498db';
            } else {
                const isCol = sb.classList.toggle('collapsed');
                btnPC.innerText = isCol ? '▶' : '◀';
            }
        }

        async function addJob() {
            const d = document.getElementById('dueDate').value, t = document.getElementById('dueTime').value;
            if(!d || !t) return alert("Required: Date & Time");
            await sb.from('tasks').insert([{ name: document.getElementById('custName').value, subject: document.getElementById('jobSubject').value, notes: document.getElementById('jobNotes').value, due_timestamp: new Date(`${d}T${t}`).getTime() }]);
            ['custName','jobSubject','jobNotes'].forEach(id => document.getElementById(id).value = '');
            if(window.innerWidth <= 768) toggleSidebar();
        }

        function openModal(id) {
            activeJobId = id; const job = queue.find(j => j.id === id);
            document.getElementById('view-name').innerText = job.name;
            document.getElementById('view-subject').innerText = job.subject;
            document.getElementById('view-notes').innerText = job.notes || "";
            const dt = new Date(job.due_timestamp);
            document.getElementById('edit-name').value = job.name;
            document.getElementById('edit-date').value = dt.toISOString().split('T')[0];
            document.getElementById('edit-time').value = dt.toTimeString().slice(0,5);
            toggleEdit(false); document.getElementById('details-modal').style.display = "flex";
        }

        async function updateJob() {
            const d = document.getElementById('edit-date').value, t = document.getElementById('edit-time').value;
            await sb.from('tasks').update({ name: document.getElementById('edit-name').value, due_timestamp: new Date(`${d}T${t}`).getTime() }).eq('id', activeJobId);
            closeModal();
        }

        async function deleteJob() { await sb.from('tasks').delete().eq('id', activeJobId); closeModal(); }
        function toggleEdit(e) { document.getElementById('view-mode').style.display = e ? 'none' : 'block'; document.getElementById('edit-mode').style.display = e ? 'flex' : 'none'; }
        function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('details-modal').style.display = 'none'; }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        
        init();
    </script>
</body>
</html>
